<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trinity AD — Offline</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: 'Inter', 'Noto Sans Thai', system-ui, sans-serif;
        background: #f4f4f4;
        color: #171a20;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px;
        text-align: center;
      }
      .badge {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #00754a;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }
      h1 {
        font-size: 18px;
        margin: 8px 0 0;
      }
      p {
        font-size: 13px;
        color: #393c41;
        margin: 0;
        max-width: 280px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">⛟</div>
      <h1>ไม่มีการเชื่อมต่อ / Offline</h1>
      <p>คุณกำลังออฟไลน์ ลองเชื่อมต่ออินเทอร์เน็ตอีกครั้ง — You are offline. Reconnect and try again.</p>
    </div>
  </body>
</html>
